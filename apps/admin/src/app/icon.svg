<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Admin console: the rootmail envelope on the staff near-black theme, with an
       amber staff shield so a tab is never confused with the customer dashboard. -->
  <rect width="32" height="32" rx="8" fill="#09090B" />
  <rect width="32" height="32" rx="8" fill="none" stroke="#27272A" stroke-width="1" />
  <g fill="none" stroke="#E4E4E7" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
    <rect x="6" y="8" width="16" height="12" rx="2.2" />
    <path d="M6.6 10.2 14 15l7.4-4.8" />
  </g>
  <!-- staff shield badge -->
  <path d="M23 15.5l4.2 1.5v3.1c0 2.7-2.1 4.2-4.2 5-2.1-.8-4.2-2.3-4.2-5V17z" fill="#F59E0B" stroke="#09090B" stroke-width="1.2" stroke-linejoin="round" />
  <path d="M21.2 20.1l1.3 1.3 2.4-2.5" fill="none" stroke="#09090B" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
</svg>
