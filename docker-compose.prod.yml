# Production stack — all five rootmail services from one file.
#
# Two ways to run a service:
#   • Pull prebuilt images from a registry (preferred — built by CI on amd64):
#       docker compose --env-file .env.prod -f docker-compose.prod.yml pull api
#       docker compose --env-file .env.prod -f docker-compose.prod.yml up -d api
#   • Build locally on the host (fallback, slow on tiny boxes):
#       docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build api
#
# Images resolve to ${REGISTRY:-pachal}/rootmail-<svc>:${TAG:-latest}. CI
# (.github/workflows/images.yml) builds + pushes these on every push to main.
#
# Postgres + Redis are intentionally NOT here — production uses managed instances
# (RDS / ElastiCache, VPC-only). Point DATABASE_URL / REDIS_URL at them in
# .env.prod. The central .env.prod is the single source of secrets; backend
# secrets stay on api/worker, and the public-facing Next apps receive ONLY the
# env they need (with .env.prod's names bridged to what each app reads).
name: rootmail

services:
  api:
    image: ${REGISTRY:-pachal}/rootmail-api:${TAG:-latest}
    build: { context: ., dockerfile: apps/api/Dockerfile }
    restart: unless-stopped
    env_file: [.env.prod] # backend: the full env surface (DB, Redis, SES, Stripe, signing…)
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      TRUST_PROXY: "1" # behind nginx/ALB
    ports: ["4000:4000"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    image: ${REGISTRY:-pachal}/rootmail-worker:${TAG:-latest}
    build: { context: ., dockerfile: apps/worker/Dockerfile }
    restart: unless-stopped
    env_file: [.env.prod] # backend: same store/queue/provider/signing env as the API
    environment:
      NODE_ENV: production

  marketing:
    image: ${REGISTRY:-pachal}/rootmail-marketing:${TAG:-latest}
    build:
      context: .
      dockerfile: apps/marketing/Dockerfile
      args:
        NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      ROOTMAIL_API_URL: ${PUBLIC_API_URL} # contact form → public /v1/leads; blog/changelog fetch
      ROOTMAIL_API_KEY: ${ROOTMAIL_API_KEY:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-} # validates the CMS on-publish /api/revalidate
    ports: ["3000:3000"]

  # Developer-audience marketing (developers.gateml.io) — static pitch site,
  # links back to the main site + dashboard; no backend deps.
  developers:
    image: ${REGISTRY:-pachal}/rootmail-developers:${TAG:-latest}
    build:
      context: .
      dockerfile: apps/developers/Dockerfile
      args:
        NEXT_PUBLIC_DASHBOARD_URL: ${NEXT_PUBLIC_DASHBOARD_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
    ports: ["3004:3000"]

  dashboard:
    image: ${REGISTRY:-pachal}/rootmail-dashboard:${TAG:-latest}
    build: { context: ., dockerfile: apps/dashboard/Dockerfile }
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      ROOTMAIL_API_URL: ${PUBLIC_API_URL} # server-side API calls only
      DASHBOARD_URL: ${DASHBOARD_URL}
      # Parent domain for the cross-subdomain "signed-in" hint cookie (e.g.
      # .gateml.io) so marketing/developers can reflect the logged-in state.
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # Apple OAuth is optional (paid developer account pending) — empty = disabled.
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
    ports: ["3001:3000"]

  admin:
    image: ${REGISTRY:-pachal}/rootmail-admin:${TAG:-latest}
    build: { context: ., dockerfile: apps/admin/Dockerfile }
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      ROOTMAIL_API_URL: ${PUBLIC_API_URL} # cross-org /v1/admin/* calls, server-side
      ROOTMAIL_DASHBOARD_URL: ${DASHBOARD_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    ports: ["3002:3000"]
