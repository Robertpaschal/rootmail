services:
  postgres:
    image: postgres:16-alpine
    container_name: rootmail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rootmail
      POSTGRES_PASSWORD: rootmail
      POSTGRES_DB: rootmail
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rootmail-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rootmail -d rootmail"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rootmail-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - rootmail-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rootmail-pg:
  rootmail-redis:
